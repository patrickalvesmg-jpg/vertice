<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<title>Meu Perfil — Mapa de Concursos CFC</title>
</head>
<body>
<div id="hd"></div>

<main class="container app-main">
  <div class="app-barra">
    <h1 class="app-titulo">Meu Perfil</h1>
  </div>

  <div class="card" style="max-width:480px;">
    <div class="campo">
      <label>E-mail</label>
      <input type="email" id="perfil-email" disabled>
    </div>
    <div class="campo">
      <label for="perfil-nome">Nome</label>
      <input type="text" id="perfil-nome" placeholder="Seu nome">
    </div>
    <button type="button" class="btn btn-primary" id="perfil-salvar">Salvar</button>
    <p id="perfil-msg" class="conc-atual" style="margin-top:10px;"></p>
    <button type="button" class="btn" id="perfil-sair" style="margin-top:18px; background:var(--cor-borda); color:var(--cor-texto);">↪ Sair</button>
  </div>
</main>

<script type="module" src="js/perfil.js"></script>
</body>
</html>
