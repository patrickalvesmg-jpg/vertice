<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<title>Meu Perfil — Mapa de Concursos CFC</title>
</head>
<body>
<div id="hd"></div>

<main class="app-main">
  <header class="app-head">
    <span class="eyebrow">Sua conta</span>
    <div class="app-headrow">
      <h1 class="app-titulo">Meu <em>perfil</em></h1>
    </div>
  </header>

  <div class="card" style="max-width:480px;">
    <div class="campo">
      <label>E-mail</label>
      <input type="email" id="perfil-email" disabled>
    </div>
    <div class="campo">
      <label for="perfil-nome">Nome</label>
      <input type="text" id="perfil-nome" placeholder="Seu nome">
    </div>
    <button type="button" class="btn btn-primary" id="perfil-salvar">Salvar</button>
    <p id="perfil-msg" class="k" style="margin-top:12px;color:var(--esmeralda-d)"></p>
    <button type="button" class="btn btn-outline" id="perfil-sair" style="margin-top:20px;">Sair</button>
  </div>
</main>

<script type="module" src="js/perfil.js"></script>
</body>
</html>
